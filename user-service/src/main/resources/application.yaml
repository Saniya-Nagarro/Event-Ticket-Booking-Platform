server:
  port: 7071

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/user_service_db
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: my-secret-key-my-secret-key-my-secret-key
  expiration: 86400000
